bundle:
  name: data-governance-portal

resources:
  apps:
    governance_portal:
      name: data-governance-portal
      description: "Enterprise Data Governance Portal - React + FastAPI + Unity Catalog"

      # Environment variables from Databricks secrets
      config:
        env:
          - name: DATABRICKS_SERVER_HOSTNAME
            valueFrom: "{{secrets/databricks/server_hostname}}"
          - name: DATABRICKS_HTTP_PATH
            valueFrom: "{{secrets/databricks/http_path}}"
          - name: DATABRICKS_TOKEN
            valueFrom: "{{secrets/databricks/token}}"

targets:
  dev:
    mode: development
    workspace:
      host: ${DATABRICKS_HOST}

  prod:
    mode: production
    workspace:
      host: ${DATABRICKS_HOST}

    permissions:
      - level: CAN_MANAGE
        group_name: "admins"
      - level: CAN_USE
        group_name: "users"
