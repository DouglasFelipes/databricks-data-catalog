bundle:
  name: data-governance-portal

resources:
  apps:
    governance_portal:
      name: data-governance-portal
      description: "Enterprise Data Governance Portal - React + FastAPI + Unity Catalog"

targets:
  dev:
    mode: development
    workspace:
      host: ${DATABRICKS_HOST}

  prod:
    mode: production
    workspace:
      host: ${DATABRICKS_HOST}

    permissions:
      - level: CAN_MANAGE
        group_name: "admins"
      - level: CAN_USE
        group_name: "users"
